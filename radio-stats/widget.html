<!-- Widget Auditeurs Radio — coller ce bloc dans votre site -->
<div id="radio-widget" style="display:inline-flex; align-items:center; gap:10px; background:#1a1a2e; color:#fff; padding:10px 18px; border-radius:12px; font-family:sans-serif;">
    <span style="width:10px; height:10px; background:#ff4757; border-radius:50%; display:inline-block; animation:pulse 1.5s infinite;"></span>
    <span style="font-size:0.85rem; color:#aaa;">Auditeurs en direct</span>
    <span id="widget-count" style="font-size:1.4rem; font-weight:800; color:#00d2ff;">--</span>
</div>

<style>
@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.3); }
}
</style>

<script>
(function() {
    // ⚙️ Changez cette URL vers l'adresse de votre proxy.php
    var PROXY_URL = 'https://VOTRE-DOMAINE.COM/proxy.php';
    var ICECAST_URL = 'https://ecmanager2.pro-fhi.net:1125/status-json.xsl';

    function fetchListeners() {
        fetch(PROXY_URL + '?url=' + encodeURIComponent(ICECAST_URL))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var count = 0;
                if (data && data.icestats && data.icestats.source) {
                    var source = data.icestats.source;
                    if (Array.isArray(source)) {
                        count = source.reduce(function(acc, s) { return acc + (parseInt(s.listeners) || 0); }, 0);
                    } else {
                        count = parseInt(source.listeners) || 0;
                    }
                }
                document.getElementById('widget-count').innerText = count;
            })
            .catch(function() {
                document.getElementById('widget-count').innerText = '--';
            });
    }

    fetchListeners();
    setInterval(fetchListeners, 15000);
})();
</script>
